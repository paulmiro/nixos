depends_on:
  - build-hawking
  - build-all-x86_64-linux
labels:
  backend: local
  platform: linux/amd64
runs_on:
  - failure
steps:
  - commands:
      - cd modules/private
      - echo $AGE_KEY_PRIVATE_DATA | nix shell nixpkgs#age --command age --decrypt -i - -o private.toml.decrypted private.toml
      - mv private.toml.decrypted private.toml
    environment:
      AGE_KEY_PRIVATE_DATA:
        from_secret: AGE_KEY_PRIVATE_DATA
    image: bash
    name: Decrypt Private Data
  - commands:
      - attic login lounge-rocks https://cache.lounge.rocks $ATTIC_KEY --set-default
    environment:
      ATTIC_KEY:
        from_secret: attic_key
    image: bash
    name: Setup Attic
  - commands:
      - nix-fast-build --no-nom --skip-cached --attic-cache lounge-rocks:nix-cache --flake '.#nixosConfigurations.leibniz.config.system.build.toplevel' --out-link 'result-leibniz'
    image: bash
    name: Build leibniz
  - commands:
      - nix --show-trace path-info --closure-size -h $(readlink -f 'result-leibniz-')
    image: bash
    name: Show leibniz info
when:
  branch:
    exclude:
      - no-private-data
    include:
      - '**'
  event:
    - push
