depends_on: []
labels:
  backend: local
  platform: linux/amd64
steps:
  - commands:
      - cd modules/private
      - echo $AGE_KEY_PRIVATE_DATA | nix shell nixpkgs#age --command age --decrypt -i - -o private.toml.decrypted private.toml
      - mv private.toml.decrypted private.toml
    environment:
      AGE_KEY_PRIVATE_DATA:
        from_secret: AGE_KEY_PRIVATE_DATA
    image: bash
    name: Decrypt Private Data
  - commands:
      - attic login lounge-rocks https://cache.lounge.rocks $ATTIC_KEY --set-default
    environment:
      ATTIC_KEY:
        from_secret: attic_key
    image: bash
    name: Setup Attic
  - commands:
      - nix-fast-build --no-nom --skip-cached --attic-cache lounge-rocks:nix-cache --flake ".#checks.x86_64-linux"
    image: bash
    name: Build all x86_64-linux machines
  - commands:
      - ls -lA
      - test -L result-backus
    failure: ignore
    image: bash
    name: check-output-backus
  - commands:
      - ls -lA
      - test -L result-hawking
    failure: ignore
    image: bash
    name: check-output-hawking
  - commands:
      - ls -lA
      - test -L result-leibniz
    failure: ignore
    image: bash
    name: check-output-leibniz
  - commands:
      - ls -lA
      - test -L result-morse
    failure: ignore
    image: bash
    name: check-output-morse
  - commands:
      - ls -lA
      - test -L result-newton
    failure: ignore
    image: bash
    name: check-output-newton
  - commands:
      - ls -lA
      - test -L result-turing
    failure: ignore
    image: bash
    name: check-output-turing
when:
  branch:
    exclude:
      - no-private-data
    include:
      - '**'
  event:
    - push
